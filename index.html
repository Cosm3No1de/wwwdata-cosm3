<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CosmeNoide · Sec | Dev Command Interface</title>
    <style>
        /* ===== Reset y Fuentes Profesionales ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0b0e14;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 255, 0, .05) 25%, rgba(0, 255, 0, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 0, .05) 75%, rgba(0, 255, 0, .05) 76%, transparent 77%, transparent), 
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 0, .05) 25%, rgba(0, 255, 0, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 0, .05) 75%, rgba(0, 255, 0, .05) 76%, transparent 77%, transparent),
                radial-gradient(circle at 10% 20%, rgba(0, 255, 0, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 0, 0.03) 0%, transparent 50%);
            background-size: 50px 50px, 50px 50px, 100%, 100%;
            font-family: 'Fira Code', 'Courier New', monospace;
            color: #c5c8c6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 760px;
            width: 100%;
            background: rgba(11, 14, 20, 0.85);
            backdrop-filter: blur(15px);
            border: 2px solid #1a1e28;
            border-radius: 24px;
            padding: 50px 30px;
            box-shadow: 0 0 80px rgba(0, 255, 0, 0.08), inset 0 0 80px rgba(0, 255, 0, 0.03);
            position: relative;
        }

        @keyframes glitch {
          0% { text-shadow: 2px 2px 0 #ff00ff, -2px -2px 0 #00ffff; transform: translate(0, 0); }
          10% { text-shadow: none; transform: translate(0, 0); }
        }

        @keyframes networkScan {
          0% { transform: translateY(-100%); opacity: 0; }
          50% { opacity: 0.15; }
          100% { transform: translateY(100%); opacity: 0; }
        }

        .container::after {
          content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
          background: linear-gradient(180deg, transparent, rgba(0, 255, 0, 0.08), transparent);
          animation: networkScan 6s ease-in-out infinite;
          pointer-events: none; border-radius: inherit;
        }

        /* ===== Header, Links y Socials (Mantenido) ===== */
        .header { text-align: center; margin-bottom: 30px; }
        .portal-ring { width: 140px; height: 140px; border-radius: 50%; border: 3px solid #2ecc71; border-color: #2ecc71 transparent #00ffff transparent; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        .logo img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .header h1 { font-size: 2.8rem; color: #2ecc71; margin-bottom: 10px; animation: glitch 4s linear infinite; }
        .badge { background: #1e2a36; padding: 5px 16px; border-radius: 30px; font-size: 0.8rem; color: #b0b0b0; border: 1px solid #2c3e50; margin: 5px; display: inline-block; }
        
        .link-item { background: #12181f; border: 2px solid #1e2a36; border-radius: 14px; padding: 18px 24px; display: flex; align-items: center; gap: 20px; text-decoration: none; color: #c5c8c6; margin-bottom: 14px; transition: 0.3s; }
        .link-item:hover { border-color: #2ecc71; background: #1a222c; transform: translateX(8px); }
        .icon { width: 44px; height: 44px; border-radius: 12px; background: #0b0e14; border: 1px solid #2c3e50; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: #2ecc71; }
        
        .social { display: flex; justify-content: center; gap: 15px; margin-top: 25px; padding: 20px; border-top: 1px solid #1a1e28; flex-wrap: wrap; background: rgba(18, 24, 31, 0.5); border-radius: 15px; }
        .social a { color: #7f8c8d; font-size: 1.2rem; text-decoration: none; padding: 8px 12px; border: 1px solid transparent; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 6px; }
        .social a:hover { color: #2ecc71; border-color: #2ecc71; background: rgba(46, 204, 113, 0.08); }
        
        .footer { text-align: center; margin-top: 35px; font-size: 0.8rem; color: #4a5555; }
        .cursor { display: inline-block; width: 10px; height: 3px; background: #2ecc71; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="portal-ring"><div class="logo"><img src="IMG_1009.jpeg" alt="CosmeNoide" /></div></div>
            <h1>CosmeNoide</h1>
            <div class="badge">#SecLvL:MAX</div>
        </div>

        <div class="links">
            <a href="https://github.com/Cosm3No1de" class="link-item"><div class="icon">🐙</div><div>GitHub Repositories</div></a>
            <a href="https://app.hackthebox.com/users/3415476" class="link-item"><div class="icon">⬢</div><div>Hack The Box</div></a>
            <a href="https://www.linkedin.com/in/alexis-such" class="link-item"><div class="icon">💼</div><div>LinkedIn Profile</div></a>
        </div>

        <!-- Panel de comunicaciones actualizado -->
        <div class="social">
            <a href="https://github.com/Cosm3No1de">🐙 GitHub</a>
            <a href="https://app.hackthebox.com/users/3415476">⬢ HTB</a>
            <a href="https://www.linkedin.com/in/alexis-such">💼 LinkedIn</a>
            <a href="https://www.instagram.com/cosmenoide/">📷 Instagram</a>
            <a href="https://soundcloud.com/demorados-rock">🎧 SoundCloud</a>
        </div>

        <div class="footer">
            <span>✦✦ CosmeNoide · Sec | Dev · Established Node ✦✦</span><span class="cursor"></span>
        </div>
    </div>
</body>
</html>
